<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "index.xml" | absURL }}">
  <style>
    :root {
      --bg: #fafaf8;
      --fg: #1a1a1a;
      --fg-muted: #666;
      --fg-faint: #999;
      --border: #e0ddd8;
      --accent: #3d3d3d;
      --link: #2c5282;
      --link-hover: #1a365d;
      --code-bg: #f0eeea;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #131311;
        --fg: #d8d4cf;
        --fg-muted: #9a958e;
        --fg-faint: #6b6760;
        --border: #2a2825;
        --accent: #c8c3bc;
        --link: #8bb4d9;
        --link-hover: #b5d1e8;
        --code-bg: #1e1d1a;
      }
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      max-width: 42rem;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      color: var(--link-hover);
      text-decoration: underline;
    }

    /* -- Site Header -- */
    .site-header {
      margin-bottom: 3rem;
    }

    .site-header .site-title {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .site-header .site-title a {
      color: var(--fg);
    }

    .site-header .site-title a:hover {
      text-decoration: none;
    }

    .site-header nav {
      margin-top: 0.3rem;
    }

    .site-header nav a {
      color: var(--fg-muted);
      font-size: 0.9rem;
      margin-right: 1rem;
    }

    .site-header nav a:hover {
      color: var(--fg);
    }

    /* -- Article -- */
    article {
      margin-bottom: 3rem;
    }

    article header {
      margin-bottom: 2rem;
    }

    article header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 0.5rem;
    }

    article header .meta {
      color: var(--fg-muted);
      font-size: 0.85rem;
    }

    .content h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .content h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.5rem;
    }

    .content p {
      margin-bottom: 1.25rem;
    }

    .content ul, .content ol {
      margin-bottom: 1.25rem;
      padding-left: 1.5rem;
    }

    .content li {
      margin-bottom: 0.35rem;
    }

    .content blockquote {
      border-left: 3px solid var(--border);
      padding-left: 1rem;
      color: var(--fg-muted);
      margin-bottom: 1.25rem;
    }

    .content code {
      font-size: 0.88em;
      background: var(--code-bg);
      padding: 0.15em 0.35em;
      border-radius: 3px;
    }

    .content pre {
      background: var(--code-bg);
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 1.25rem;
    }

    .content pre code {
      background: none;
      padding: 0;
    }

    .content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .content strong {
      font-weight: 600;
    }

    .content em {
      font-style: italic;
    }

    .content img {
      max-width: 100%;
      height: auto;
    }

    /* -- List Pages -- */
    .post-list {
      list-style: none;
    }

    .post-list li {
      padding: 0.6rem 0;
    }

    .post-list li + li {
      border-top: 1px solid var(--border);
    }

    .post-list .post-title {
      font-weight: 500;
      font-size: 1rem;
    }

    .post-list .post-date {
      color: var(--fg-faint);
      font-size: 0.8rem;
      margin-left: 0.5rem;
      white-space: nowrap;
    }

    /* -- Section Header -- */
    .section-header {
      margin-bottom: 2rem;
    }

    .section-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .section-header p {
      color: var(--fg-muted);
      font-size: 0.9rem;
    }

    /* -- Footer -- */
    .site-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--fg-faint);
      font-size: 0.8rem;
    }

    .site-footer a {
      color: var(--fg-muted);
    }

    .site-footer .links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    @media (max-width: 480px) {
      body {
        padding: 2rem 1rem;
      }

      article header h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="site-title"><a href="/">neutral.zone</a></div>
    <nav>
      {{- range .Site.Menus.main }}
      <a href="{{ .URL }}">{{ .Name }}</a>
      {{- end }}
    </nav>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="links">
      <a href="https://unpingable.com" target="_blank" rel="noopener">unpingable.com</a>
      <a href="https://github.com/unpingable" target="_blank" rel="noopener">GitHub</a>
      <a href="https://bsky.app/profile/unpingable.com" target="_blank" rel="noopener">Bluesky</a>
      <a href="{{ .Site.Params.substack }}" target="_blank" rel="noopener">Substack</a>
      <a href="/index.xml">RSS</a>
    </div>
    <p>&copy; {{ now.Year }} {{ .Site.Params.author }}</p>
  </footer>

</body>
</html>
