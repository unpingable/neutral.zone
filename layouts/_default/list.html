{{ define "main" }}
<div class="section-header">
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p>{{ . }}</p>{{ end }}
  {{ .Content }}
</div>

{{ range .Pages.GroupByDate "2006" }}
<h2>{{ .Key }}</h2>
<ul class="post-list">
  {{- range .Pages }}
  <li>
    <a class="post-title" href="{{ .RelPermalink }}">{{ .Title }}</a>
    <span class="post-date">{{ .Date.Format "Jan 2" }}</span>
  </li>
  {{- end }}
</ul>
{{ end }}
{{ end }}
