{{ define "main" }}
<div class="home">
  <div class="home-intro">
    {{ .Content }}
  </div>

  <section>
    <h2>Recent</h2>
    <ul class="post-list">
      {{- range first 10 .Site.RegularPages.ByDate.Reverse }}
      <li>
        <a class="post-title" href="{{ .RelPermalink }}">{{ .Title }}</a>
        <span class="post-date">{{ .Date.Format "Jan 2006" }}</span>
      </li>
      {{- end }}
    </ul>
  </section>
</div>
{{ end }}
